x-dashboard-build: &dashboard-build
  context: ./dashboard
  dockerfile: Dockerfile
  args:
    NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}

services:
  dashboard-db:
    image: postgres:16-alpine
    container_name: pentest_dashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pentest_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dashboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pentest_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-redis:
    image: redis:7-alpine
    container_name: pentest_dashboard_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - dashboard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-api:
    build: *dashboard-build
    image: pentest-dashboard:latest
    container_name: pentest_dashboard_api
    restart: unless-stopped
    env_file:
      - ./dashboard/.env
    command: ["sh", "-c", "npm run prisma:migrate:deploy && npm run start:api"]
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      SOCKET_URL: ${SOCKET_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://postgres:postgres@dashboard-db:5432/pentest_dashboard?schema=public
      REDIS_URL: redis://dashboard-redis:6379
      REPORT_STORAGE_PATH: /app/storage/reports
      PENTESTBOT_API_URL: ${PENTESTBOT_API_URL:-http://pentestbot:8080}
      PENTESTBOT_API_TOKEN: ${PENTESTBOT_API_TOKEN:-}
    ports:
      - "4000:4000"
    depends_on:
      dashboard-db:
        condition: service_healthy
      dashboard-redis:
        condition: service_healthy
    volumes:
      - dashboard_reports:/app/storage/reports
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard-worker:
    build: *dashboard-build
    image: pentest-dashboard:latest
    container_name: pentest_dashboard_worker
    restart: unless-stopped
    env_file:
      - ./dashboard/.env
    command: ["npm", "run", "start:worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@dashboard-db:5432/pentest_dashboard?schema=public
      REDIS_URL: redis://dashboard-redis:6379
      REPORT_STORAGE_PATH: /app/storage/reports
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      PENTESTBOT_API_URL: ${PENTESTBOT_API_URL:-http://pentestbot:8080}
      PENTESTBOT_API_TOKEN: ${PENTESTBOT_API_TOKEN:-}
    depends_on:
      dashboard-db:
        condition: service_healthy
      dashboard-redis:
        condition: service_healthy
      dashboard-api:
        condition: service_healthy
      pentestbot:
        condition: service_healthy
    volumes:
      - dashboard_reports:/app/storage/reports

  dashboard-web:
    build: *dashboard-build
    image: pentest-dashboard:latest
    container_name: pentest_dashboard_web
    restart: unless-stopped
    env_file:
      - ./dashboard/.env
    command: ["npm", "run", "start:web"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      dashboard-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  pentestbot:
    build:
      context: ./pentestbot_2-main
      dockerfile: Dockerfile
    image: pentestbot:v2
    container_name: pentestbot_v2
    restart: unless-stopped
    env_file:
      - ./pentestbot_2-main/.env
    environment:
      HOME: /home/pentestbot
      PENTESTBOT_DATA_DIR: /app/data
      PENTESTBOT_LOGS_DIR: /app/logs
      PENTESTBOT_REPORTS_DIR: /app/reports
      PENTESTBOT_WORK_DIR: /app/data/work
      PENTESTBOT_DB_PATH: /app/data/pentestbot.db
    volumes:
      - pentestbot_data:/app/data
      - pentestbot_logs:/app/logs
      - pentestbot_reports:/app/reports
      - pentestbot_nuclei_templates:/home/pentestbot/.config/nuclei
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python3 main.py --check-tools >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  dashboard_postgres_data:
  dashboard_redis_data:
  dashboard_reports:
  pentestbot_data:
  pentestbot_logs:
  pentestbot_reports:
  pentestbot_nuclei_templates:
