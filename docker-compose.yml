# ============================================================
# PentestBot v2 — Docker Compose
# 4-Service Architecture:
#   1. engine     – FastAPI + Scanner Pipeline (port 8000)
#   2. frontend   – Next.js Dashboard (port 3000)
#   3. cloudflared – Cloudflare Tunnel for public access
# ============================================================

services:
  # ── Engine (Backend + Scanner) ──────────────────────────────
  engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentestbot-engine
    restart: unless-stopped
    ports:
      - "${ENGINE_PORT:-8000}:8000"
    environment:
      - GROQ_API_KEYS=${GROQ_API_KEYS:-${GROQ_API_KEY:-}}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - PENTESTBOT_API_PORT=8000
      - PENTESTBOT_API_TOKEN=${PENTESTBOT_API_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_SCANS=${MAX_CONCURRENT_SCANS:-3}
      # Tool toggles
      - ENABLE_AMASS=${ENABLE_AMASS:-false}
      - ENABLE_GOBUSTER=${ENABLE_GOBUSTER:-true}
      - ENABLE_FINGERPRINT=${ENABLE_FINGERPRINT:-true}
      - ENABLE_NIKTO=${ENABLE_NIKTO:-false}
      - ENABLE_WPSCAN=${ENABLE_WPSCAN:-false}
      - ENABLE_JOOMSCAN=${ENABLE_JOOMSCAN:-false}
      - ENABLE_S3SCANNER=${ENABLE_S3SCANNER:-false}
      - ENABLE_SSLYZE=${ENABLE_SSLYZE:-true}
      # Scan tuning
      - NAABU_TOP_PORTS=${NAABU_TOP_PORTS:-1000}
      - NAABU_RATE=${NAABU_RATE:-1000}
      - NUCLEI_SEVERITY=${NUCLEI_SEVERITY:-critical,high,medium}
      - NUCLEI_RATE_LIMIT=${NUCLEI_RATE_LIMIT:-150}
      - SCAN_TIMEOUT=${SCAN_TIMEOUT:-3600}
    volumes:
      - engine-data:/app/data
      - engine-logs:/app/logs
      - engine-reports:/app/reports
      - nuclei-templates:/home/pentestbot/.config/nuclei
    cap_add:
      - NET_RAW          # Required for naabu/nmap raw sockets
    networks:
      - pentestbot
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Next.js Dashboard) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_TOKEN: ${PENTESTBOT_API_TOKEN:-}
    container_name: pentestbot-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      engine:
        condition: service_healthy
    networks:
      - pentestbot
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Cloudflare Tunnel ───────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pentestbot-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - TUNNEL_TRANSPORT_PROTOCOL=http2
    depends_on:
      engine:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - pentestbot

# ── Volumes ──────────────────────────────────────────────────
volumes:
  engine-data:
    driver: local
  engine-logs:
    driver: local
  engine-reports:
    driver: local
  nuclei-templates:
    driver: local

# ── Network ──────────────────────────────────────────────────
networks:
  pentestbot:
    driver: bridge
